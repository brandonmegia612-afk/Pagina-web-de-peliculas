services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: database
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d database"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://username:password@db:5432/database
      NODE_ENV: production
      PORT: 3001
      ADMIN_EMAIL: brandonmegia612@gmail.com
      ADMIN_PASSWORD: 336796uy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/mi-app
      args:
        REACT_APP_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:3001
    restart: unless-stopped

volumes:
  db_data:
